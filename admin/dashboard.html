<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Rain Home Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-dashboard">
    <!-- Check authentication -->
    <script>
        if (sessionStorage.getItem('adminAuthenticated') !== 'true') {
            window.location.href = 'admin.html';
        }
    </script>

    <!-- Admin Header -->
    <header class="admin-header">
        <div class="admin-header-left">
            <i class="fas fa-leaf"></i>
            <h1>Rain Home Park Admin</h1>
        </div>
        <div class="admin-header-right">
            <a href="../index.html" class="btn-visit-site">
                <i class="fas fa-external-link-alt"></i> Visit Website
            </a>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <!-- Admin Navigation -->
    <nav class="admin-nav">
        <button class="admin-nav-btn active" onclick="switchTab('bookings')">
            <i class="fas fa-calendar-check"></i> Bookings
        </button>
        <button class="admin-nav-btn" onclick="switchTab('gallery')">
            <i class="fas fa-images"></i> Gallery
        </button>
        <button class="admin-nav-btn" onclick="switchTab('packages')">
            <i class="fas fa-box"></i> Packages
        </button>
        <button class="admin-nav-btn" onclick="switchTab('settings')">
            <i class="fas fa-cog"></i> Settings
        </button>
    </nav>

    <!-- Dashboard Content -->
    <main class="admin-content">
        <!-- Bookings Tab -->
        <section class="admin-tab active" id="bookingsTab">
            <div class="tab-header">
                <h2>Booking Requests</h2>
                <span class="booking-count" id="bookingCount">0 bookings</span>
            </div>
            <div class="bookings-list" id="bookingsList">
                <p class="no-data">No bookings yet.</p>
            </div>
        </section>

        <!-- Gallery Tab -->
        <section class="admin-tab" id="galleryTab">
            <div class="tab-header">
                <h2>Gallery Management</h2>
            </div>
            <div class="gallery-manager">
                <div class="add-gallery-form">
                    <h3>Add New Image</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="form-group">
                            <label>Caption</label>
                            <input type="text" id="imageCaption" placeholder="Image description">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Or upload from device</label>
                        <input type="file" id="imageUpload" accept="image/*">
                    </div>
                    <button class="btn-add" onclick="addGalleryImage()">
                        <i class="fas fa-plus"></i> Add Image
                    </button>
                </div>
                <div class="gallery-grid-admin" id="adminGalleryList">
                    <!-- Gallery images managed here -->
                </div>
            </div>
        </section>

        <!-- Packages Tab -->
        <section class="admin-tab" id="packagesTab">
            <div class="tab-header">
                <h2>Event Packages</h2>
            </div>
            <div class="packages-manager">
                <div class="add-package-form">
                    <h3>Add/Edit Package</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Package Name</label>
                            <input type="text" id="packageTitle" placeholder="e.g., Wedding Premium">
                        </div>
                        <div class="form-group">
                            <label>Price</label>
                            <input type="text" id="packagePrice" placeholder="$5,000">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="packageDescription" rows="3" placeholder="Package details..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Features (comma separated)</label>
                        <input type="text" id="packageFeatures" placeholder="Feature 1, Feature 2, Feature 3">
                    </div>
                    <button class="btn-add" onclick="addOrUpdatePackage()">
                        <i class="fas fa-save"></i> Save Package
                    </button>
                </div>
                <div class="packages-list" id="adminPackagesList">
                    <!-- Packages managed here -->
                </div>
            </div>
        </section>

        <!-- Settings Tab -->
        <section class="admin-tab" id="settingsTab">
            <div class="tab-header">
                <h2>Site Settings</h2>
            </div>
            <form id="settingsForm" class="settings-form" onsubmit="saveSettings(event)">
                <h3>Contact Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="parkPhone">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="parkEmail">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="parkAddress">
                </div>
                
                <h3>Social Media Links</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Facebook URL</label>
                        <input type="url" id="socialFacebook">
                    </div>
                    <div class="form-group">
                        <label>Instagram URL</label>
                        <input type="url" id="socialInstagram">
                    </div>
                </div>
                <div class="form-group">
                    <label>Twitter URL</label>
                    <input type="url" id="socialTwitter">
                </div>
                
                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Save Settings
                </button>
            </form>
        </section>
    </main>

    <!-- Logout Function -->
    <script>
        function logout() {
            sessionStorage.removeItem('adminAuthenticated');
            window.location.href = 'admin.html';
        }
    </script>

    <!-- Load Admin JS -->
    <script src="../js/admin.js"></script>
</body>
</html>
